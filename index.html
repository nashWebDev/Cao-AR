<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GLB Loader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #00f5c4;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #4a4a6a;
  }

  body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  #scene-container {
    width: 100vw;
    height: 100vh;
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #scene-container.visible { opacity: 1; }

  /* ── LOADER OVERLAY ── */
  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 100;
    transition: opacity 0.6s ease, visibility 0.6s;
  }

  #loader.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loader-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Circular ring progress */
  .ring-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .ring-wrapper svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-track {
    fill: none;
    stroke: var(--surface);
    stroke-width: 3;
  }

  .ring-fill {
    fill: none;
    stroke: url(#ringGradient);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 345;
    stroke-dashoffset: 345;
    transition: stroke-dashoffset 0.25s ease;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .ring-percent {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .ring-number {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .ring-pct {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* Bar progress */
  .bar-container {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-track {
    height: 2px;
    background: var(--surface);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.25s ease;
    box-shadow: 0 0 10px var(--accent);
  }

  /* Shimmer sweep on bar */
  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 100%;
    background: rgba(255,255,255,0.4);
    filter: blur(4px);
  }

  .bar-stats {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* Status messages */
  #status-msg {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.25em;
    height: 14px;
    text-align: center;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Dot pulse */
  .dots {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Loaded toast */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 10px 24px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 200;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body>

<audio id="speech">
        <source src="https://nashwebdev.github.io/AR-test/speech.mp3" type="audio/mpeg">
    </audio>

<div id="scene-container">

     <a-scene
    mindar-image="imageTargetSrc: https://nashwebdev.github.io/AR-test/nfts/targets(1).mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item
        id="avatarModel"
        src="https://nashwebdev.github.io/AR-test/Robo.glb"
      ></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#avatarModel"
        position="0 0 0"
        scale="3 3 3"
        rotation="-90 180 0"
        animation-mixer
      ></a-gltf-model>
    </a-entity>
  </a-scene>
</div>

<div id="loader">
  <div class="loader-label">Loading Asset</div>

  <div class="ring-wrapper">
    <svg viewBox="0 0 120 120">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7b61ff"/>
          <stop offset="100%" stop-color="#00f5c4"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="60" cy="60" r="55"/>
      <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="55"/>
    </svg>
    <div class="ring-percent">
      <span class="ring-number" id="ringNumber">0</span>
      <span class="ring-pct">%</span>
    </div>
  </div>

  <div class="bar-container">
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="bar-stats">
      <span id="loadedKb">0 KB</span>
      <span id="totalKb">— KB</span>
    </div>
  </div>

  <div id="status-msg">INITIALISING</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div id="toast">MODEL LOADED</div>

<!-- Three.js + GLTFLoader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ── UI helpers ──────────────────────────────────────────
const ringFill   = document.getElementById('ringFill');
const ringNumber = document.getElementById('ringNumber');
const barFill    = document.getElementById('barFill');
const loadedKb   = document.getElementById('loadedKb');
const totalKb    = document.getElementById('totalKb');
const statusMsg  = document.getElementById('status-msg');
const loader     = document.getElementById('loader');
const sceneEl    = document.getElementById('scene-container');
const toast      = document.getElementById('toast');

const CIRCUMFERENCE = 2 * Math.PI * 55; // ~345.4

function setProgress(pct) {
  const p = Math.min(100, Math.max(0, pct));
  // Ring
  ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - p / 100);
  ringNumber.textContent = Math.round(p);
  // Bar
  barFill.style.width = p + '%';
}

function fmt(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

// ── Three.js scene ───────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
sceneEl.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 1000);
camera.position.set(0, 1, 3);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(5, 10, 7);
scene.add(dir);
const fill = new THREE.DirectionalLight(0x7b61ff, 0.4);
fill.position.set(-5, -2, -5);
scene.add(fill);

// ── Load GLB ─────────────────────────────────────────────
// 🔧 CHANGE THIS to your actual .glb file path or URL:
const GLB_URL = 'https://nashwebdev.github.io/AR-test/Robo.glb';

statusMsg.textContent = 'FETCHING MODEL';

const gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(
  GLB_URL,

  // ✅ onLoad
  (gltf) => {
    setProgress(100);
    statusMsg.textContent = 'PROCESSING GEOMETRY';

    setTimeout(() => {
      scene.add(gltf.scene);

      // Auto-center + scale
      const box    = new THREE.Box3().setFromObject(gltf.scene);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale  = 2 / maxDim;
      gltf.scene.scale.setScalar(scale);
      gltf.scene.position.sub(center.multiplyScalar(scale));
      camera.position.set(0, size.y * scale * 0.5, maxDim * scale * 2);
      controls.target.set(0, size.y * scale * 0.3, 0);
      controls.update();

      // Play animations if any
      if (gltf.animations?.length) {
        const mixer = new THREE.AnimationMixer(gltf.scene);
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
        const clock = new THREE.Clock();
        renderer.setAnimationLoop(() => {
          mixer.update(clock.getDelta());
          controls.update();
          renderer.render(scene, camera);
        });
      } else {
        renderer.setAnimationLoop(() => {
          controls.update();
          renderer.render(scene, camera);
        });
      }

      // Hide loader, show scene
      loader.classList.add('hidden');
      sceneEl.classList.add('visible');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }, 300);
  },

  // 📊 onProgress — this is the key callback
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = (xhr.loaded / xhr.total) * 100;
      setProgress(pct);
      loadedKb.textContent = fmt(xhr.loaded);
      totalKb.textContent  = fmt(xhr.total);
      statusMsg.textContent = pct < 30  ? 'DOWNLOADING'
                            : pct < 70  ? 'PARSING DATA'
                            : pct < 95  ? 'BUILDING MESH'
                            : 'FINALISING';
    } else {
      // Size not known — show bytes only
      loadedKb.textContent = fmt(xhr.loaded);
      totalKb.textContent  = '?';
      // Animate ring loosely
      const fake = Math.min(90, (xhr.loaded / (5 * 1024 * 1024)) * 90);
      setProgress(fake);
    }
  },

  // ❌ onError
  (err) => {
    console.error('GLB load error:', err);
    statusMsg.textContent = 'LOAD FAILED — CHECK CONSOLE';
    ringNumber.style.color = '#ff4466';
  }
);



const sceneA = document.querySelector('a-entity');
     var speech = document.getElementById('speech');

sceneA.addEventListener("targetFound", () => {
         speech.play()
        texts.style.display = "none";

        setTimeout(() => {
            document.addEventListener("click", () => {
            window.location.href = "https://bereagroup.co.za"
            // btn.style.display = "flex";
        });
        }, 3000);
    });

    sceneA.addEventListener('targetLost' ,() =>{
       speech.pause()
      texts.style.display = "block";
    })

// ── Resize ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
